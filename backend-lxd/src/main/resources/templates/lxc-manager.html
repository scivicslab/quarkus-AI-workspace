<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LXC Manager — LXD-pups</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cellipse cx='32' cy='44' rx='14' ry='12' fill='%23F97316'/%3E%3Ccircle cx='18' cy='22' r='7' fill='%23F97316'/%3E%3Ccircle cx='46' cy='22' r='7' fill='%23F97316'/%3E%3Ccircle cx='10' cy='34' r='6' fill='%23F97316'/%3E%3Ccircle cx='54' cy='34' r='6' fill='%23F97316'/%3E%3C/svg%3E">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --orange:        #F97316;
            --orange-dark:   #EA580C;
            --orange-darker: #C2410C;
            --orange-light:  #FFF7ED;
            --orange-border: #FDBA74;
            --bg:     #F8FAFC;
            --card:   #FFFFFF;
            --text:   #1E293B;
            --muted:  #64748B;
            --border: #E2E8F0;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 14px rgba(0,0,0,.06);
            --radius: 14px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--orange-darker) 0%, var(--orange) 100%);
            padding: 0 28px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 10px rgba(0,0,0,.18);
            position: sticky; top: 0; z-index: 100;
        }
        .brand { display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; }
        .brand-sep { width: 1px; height: 18px; background: rgba(255,255,255,.4); margin: 0 6px; }
        .brand-logo { font-size: 26px; line-height: 1; }
        .brand-name { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
        .brand-tag  { font-size: 14px; font-weight: 500; }

        .back-link {
            color: white; text-decoration: none; font-size: 14px; font-weight: 600;
            padding: 6px 14px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,.4);
            transition: background .15s;
        }
        .back-link:hover { background: rgba(255,255,255,.15); }

        main { max-width: 1000px; margin: 0 auto; padding: 36px 24px 60px; }

        .section-label {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--muted); margin-bottom: 14px;
        }

        /* Table */
        .data-table {
            width: 100%; border-collapse: collapse;
            background: var(--card); border-radius: var(--radius);
            box-shadow: var(--shadow); overflow: hidden;
            margin-bottom: 32px;
        }
        .data-table th {
            background: var(--orange-light); color: var(--text);
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .5px; padding: 12px 16px; text-align: left;
            border-bottom: 2px solid var(--orange-border);
        }
        .data-table td {
            padding: 12px 16px; font-size: 14px;
            border-bottom: 1px solid var(--border);
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: #FAFBFC; }
        .mono { font-family: 'SF Mono', Consolas, monospace; font-size: 12px; }

        /* Badges */
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: .3px; white-space: nowrap;
        }
        .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
        .badge-Running { background: #D1FAE5; color: #065F46; }
        .badge-Running::before { background: #10B981; }
        .badge-Stopped { background: #F1F5F9; color: #475569; }
        .badge-Stopped::before { background: #94A3B8; }
        .badge-worker { background: #DBEAFE; color: #1E40AF; }
        .badge-worker::before { background: #3B82F6; }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px; border-radius: 6px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            border: none; transition: all .15s ease;
        }
        .btn-primary { background: var(--orange); color: white; }
        .btn-primary:hover { background: var(--orange-dark); }
        .btn-stop { background: white; color: #EF4444; border: 1.5px solid #FCA5A5; }
        .btn-stop:hover { background: #FEF2F2; }
        .btn-danger { background: #EF4444; color: white; }
        .btn-danger:hover { background: #DC2626; }
        .btn-group { display: flex; gap: 6px; }

        .empty-msg { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }

        /* Loading overlay */
        .loading { opacity: .5; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <a class="brand" href="/">
        <span class="brand-logo">&#x1f43e;</span>
        <span class="brand-name">lxd-pups</span>
        <span class="brand-sep"></span>
        <span class="brand-tag">LXC Manager</span>
    </a>
    <a class="back-link" href="/">&#x2190; Dashboard</a>
</header>

<main>
    <!-- Container Images -->
    <p class="section-label">Container Images</p>
    <table class="data-table" id="images-table">
        <thead>
            <tr>
                <th>Alias</th>
                <th>Description</th>
                <th>Size</th>
                <th>Fingerprint</th>
                <th>Uploaded</th>
            </tr>
        </thead>
        <tbody id="images-body">
            <tr><td colspan="5" class="empty-msg">Loading...</td></tr>
        </tbody>
    </table>

    <!-- All Containers -->
    <p class="section-label">All Containers</p>
    <table class="data-table" id="containers-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Status</th>
                <th>IP</th>
                <th>Label</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="containers-body">
            <tr><td colspan="5" class="empty-msg">Loading...</td></tr>
        </tbody>
    </table>
</main>

<script>
    function escHtml(s) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(s));
        return d.innerHTML;
    }

    function loadImages() {
        fetch('/api/lxc/images')
            .then(function(r) { return r.json(); })
            .then(function(images) {
                var tbody = document.getElementById('images-body');
                if (images.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">No images found.</td></tr>';
                    return;
                }
                var html = '';
                for (var i = 0; i < images.length; i++) {
                    var img = images[i];
                    var aliases = img.aliases.length > 0 ? img.aliases.join(', ') : '(none)';
                    var uploaded = img.uploadedAt ? img.uploadedAt.substring(0, 19).replace('T', ' ') : '';
                    html += '<tr>'
                        + '<td><strong>' + escHtml(aliases) + '</strong></td>'
                        + '<td>' + escHtml(img.description) + '</td>'
                        + '<td class="mono">' + img.sizeMB + ' MB</td>'
                        + '<td class="mono">' + escHtml(img.fingerprint) + '</td>'
                        + '<td class="mono">' + escHtml(uploaded) + '</td>'
                        + '</tr>';
                }
                tbody.innerHTML = html;
            });
    }

    function loadContainers() {
        fetch('/api/lxc/containers')
            .then(function(r) { return r.json(); })
            .then(function(containers) {
                var tbody = document.getElementById('containers-body');
                if (containers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">No containers found.</td></tr>';
                    return;
                }
                var html = '';
                for (var i = 0; i < containers.length; i++) {
                    var c = containers[i];
                    var labelBadge = c.image === 'worker' ? '<span class="badge badge-worker">worker</span>' : escHtml(c.image);
                    var actions = '<div class="btn-group">';
                    if (c.status === 'Running') {
                        actions += '<button class="btn btn-stop" onclick="containerAction(\'' + escHtml(c.name) + '\', \'stop\')">Stop</button>';
                    } else {
                        actions += '<button class="btn btn-primary" onclick="containerAction(\'' + escHtml(c.name) + '\', \'start\')">Start</button>';
                        actions += '<button class="btn btn-danger" onclick="containerDelete(\'' + escHtml(c.name) + '\')">Delete</button>';
                    }
                    actions += '</div>';
                    html += '<tr>'
                        + '<td><strong>' + escHtml(c.name) + '</strong></td>'
                        + '<td><span class="badge badge-' + c.status + '">' + escHtml(c.status) + '</span></td>'
                        + '<td class="mono">' + escHtml(c.ip || '-') + '</td>'
                        + '<td>' + labelBadge + '</td>'
                        + '<td>' + actions + '</td>'
                        + '</tr>';
                }
                tbody.innerHTML = html;
            });
    }

    function containerAction(name, action) {
        fetch('/api/containers/' + encodeURIComponent(name) + '/' + action + '?remote=local', { method: 'POST' })
            .then(function() { loadContainers(); });
    }

    function containerDelete(name) {
        if (!confirm('Delete container "' + name + '"? This cannot be undone.')) return;
        fetch('/api/containers/' + encodeURIComponent(name) + '?remote=local', { method: 'DELETE' })
            .then(function() { loadContainers(); });
    }

    // Initial load
    loadImages();
    loadContainers();

    // Auto-refresh every 10 seconds
    setInterval(function() { loadContainers(); }, 10000);
</script>

</body>
</html>
