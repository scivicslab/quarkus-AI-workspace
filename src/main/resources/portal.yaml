portal:
  port: 15080
  title: "LXD-pups Dev Environment"

management:
  mcp-gateway:
    enabled: true
    port: 15888
    description: "MCP Gateway"
    ui: "http://localhost:15888/"
    binary:
      repo: scivicslab/quarkus-mcp-gateway
      version: v1.0.0
      asset: quarkus-mcp-gateway-v1.0.0-linux-x86_64
      path: ~/bin/quarkus-mcp-gateway

  predict-ja:
    enabled: true
    port: 15190
    description: "predict-ja"
    ui: "http://localhost:15190/"
    binary:
      repo: oogasawa/fcitx5-predict-ja
      version: v1.0.0
      asset: fcitx5-predict-ja-1.0.0.jar
      path: ~/bin/fcitx5-predict-ja.jar
      runtime: java
      args: "--port 15190 --gateway-url http://localhost:15888 --gateway-poll 60 --ime-learning false --vllm-url http://192.168.5.15:8000 --vllm-model Qwen3.5-35B-A3B"

  predict-en:
    enabled: false
    port: 15191
    description: "predict-en"

worker-template:
  mcp-gateway:
    enabled: true
    singleton: true
    unit: mcp-gateway.service
    port: 15888
    description: "MCP Gateway"

  llm-console-claude:
    enabled: true
    singleton: false
    unit: llm-console-claude@.service
    port-range: 15200-15299
    instances:
      - port: 15200
        title: "Claude — Coding"
      - port: 15201
        title: "Claude — Research"
      - port: 15202
        title: "Claude — Docs"
    description: "LLM Console — Claude"

  workflow-editor:
    enabled: true
    singleton: false
    unit: workflow-editor@.service
    port-range: 15300-15399
    instances:
      - port: 15300
        title: "Workflow — Analysis"
      - port: 15301
        title: "Workflow — Deploy"
    description: "Turing Workflow Editor"

remotes:
  local:
    description: "This machine"
