portal:
  port: 8080
  title: "LXD-pups Dev Environment"

management:
  mcp-gateway:
    enabled: true
    port: 8888
    description: "MCP Gateway"
    ui: "http://localhost:8888/"
    binary:
      repo: scivicslab/quarkus-mcp-gateway
      version: v1.0.0
      asset: quarkus-mcp-gateway-v1.0.0-linux-x86_64
      path: ~/bin/quarkus-mcp-gateway

  predict-ja:
    enabled: true
    port: 8190
    description: "predict-ja"
    ui: "http://localhost:8190/"
    binary:
      repo: oogasawa/fcitx5-predict-ja
      version: v1.0.0
      asset: fcitx5-predict-ja-1.0.0.jar
      path: ~/bin/fcitx5-predict-ja.jar
      runtime: java
      args: "--gateway-url http://localhost:8888 --gateway-poll 60 --ime-learning false --vllm-url http://192.168.5.15:8000 --vllm-model Qwen3.5-35B-A3B"

  predict-en:
    enabled: false
    port: 8191
    description: "predict-en"

worker-template:
  mcp-gateway:
    enabled: true
    singleton: true
    unit: mcp-gateway.service
    port: 8888
    description: "MCP Gateway"

  llm-console-claude:
    enabled: true
    singleton: false
    unit: llm-console-claude@.service
    port-range: 8200-8299
    instances:
      - port: 8200
        title: "Claude — Coding"
      - port: 8201
        title: "Claude — Research"
      - port: 8202
        title: "Claude — Docs"
    description: "LLM Console — Claude"

  workflow-editor:
    enabled: true
    singleton: false
    unit: workflow-editor@.service
    port-range: 9300-9399
    instances:
      - port: 9300
        title: "Workflow — Analysis"
      - port: 9301
        title: "Workflow — Deploy"
    description: "Turing Workflow Editor"

remotes:
  local:
    description: "This machine"
