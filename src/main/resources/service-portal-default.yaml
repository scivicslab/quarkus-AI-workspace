backend: jvm

jvm:
  tools:
    # MCP Gateway: starts automatically
    - name: quarkus-mcp-gateway
      jar: quarkus-mcp-gateway.jar
      port: 28081
      fixedPort: true
      autoStart: true

    # Chat UI: launched on demand from the dashboard
    - name: quarkus-chat-ui
      jar: quarkus-chat-ui.jar
      port: 28100
      autoStart: false
      params:
        - key: workdir
          label: Working Directory
          type: dir
          default: ${HOME}/works
          workingDir: true
        - key: provider
          label: LLM Provider
          type: select
          default: claude
          jvmProp: chat-ui.provider
          options:
            - { value: claude,        label: Claude }
            - { value: codex,         label: Codex (OpenAI) }
            - { value: openai-compat, label: Local LLM (vLLM) }
        - key: servers
          label: vLLM Endpoint (Local LLM only)
          type: text
          default: ${VLLM_ENDPOINT}
          jvmProp: chat-ui.servers

    # Document portal: launched on demand
    - name: html-saurus
      jar: html-saurus.jar
      port: 28110
      autoStart: false
      args:
        - ${HOME}/works
        - --portal-mode
        - --serve
        - --port
        - "${PORT}"
      params:
        - key: dir
          label: Document Root
          type: dir
          default: ${HOME}/works
          argPos: 0

    # Turing Workflow Editor: launched on demand
    - name: turing-workflow-editor
      jar: turing-workflow-editor.jar
      port: 28120
      autoStart: false
      params:
        - key: workdir
          label: Working Directory
          type: dir
          default: ${HOME}/works
          workingDir: true
