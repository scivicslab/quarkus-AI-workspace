quarkus.http.port=15080
quarkus.log.category."com.scivicslab".level=INFO
quarkus.http.access-log.enabled=true

# Kafka: container command bus
kafka.bootstrap.servers=localhost:9092
mp.messaging.incoming.lxd-pups-commands.connector=smallrye-kafka
mp.messaging.incoming.lxd-pups-commands.topic=lxd-pups-commands
mp.messaging.incoming.lxd-pups-commands.value.deserializer=com.scivicslab.lxdpups.kafka.ContainerCommandDeserializer
mp.messaging.incoming.lxd-pups-commands.group.id=lxd-pups-portal
mp.messaging.incoming.lxd-pups-commands.auto.offset.reset=latest

# Kafka lifecycle: auto-start a local Kafka broker if not already running
lxd.pups.kafka.home=
lxd.pups.kafka.auto-start=false

# Do not fail startup if Kafka broker is unreachable
quarkus.kafka.health.enabled=false
mp.messaging.incoming.lxd-pups-commands.health.enabled=false
