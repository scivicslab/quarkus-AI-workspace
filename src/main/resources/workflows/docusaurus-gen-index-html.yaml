name: docusaurus-gen-index-html
description: "Regenerate ~/public_html/index.html with navbar labels"
tags:
  - docusaurus
  - index.html
steps:
  - states: ["0", "1"]
    actions:
      - actor: shell
        method: exec
        arguments: |
          echo "=== Generating index.html ==="
          python3 /opt/lxd-pups-portal/scripts/gen_doc_index.py

  - states: ["1", "end"]
    actions:
      - actor: log
        method: info
        arguments: "index.html generation complete"
