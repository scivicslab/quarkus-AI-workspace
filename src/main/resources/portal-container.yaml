portal:
  port: 16080
  mode: container
  title: "AI Worker"
  parentUrl: "http://HOST_IP:16900/"

management:
  mcp-gateway:
    enabled: true
    port: 16888
    description: "MCP Gateway"
    ui: "http://localhost:16888/"
    binary:
      repo: scivicslab/quarkus-mcp-gateway
      version: v1.0.0
      asset: quarkus-mcp-gateway-v1.0.0-linux-x86_64
      path: ~/bin/quarkus-mcp-gateway

  llm-console-local:
    enabled: true
    port: 16100
    description: "LLM Console (Local)"
    ui: "http://localhost:16100/"
    binary:
      repo: scivicslab/quarkus-llm-console
      version: v1.0.0
      asset: quarkus-llm-console-v1.0.0-linux-x86_64
      path: ~/bin/quarkus-llm-console

  claude-code:
    enabled: true
    port: 16120
    description: "Claude Code"
    ui: "http://localhost:16120/"
    binary:
      repo: ""
      version: ""
      asset: ""
      path: ""

  codex:
    enabled: true
    port: 16140
    description: "Codex"
    ui: "http://localhost:16140/"
    binary:
      repo: ""
      version: ""
      asset: ""
      path: ""

  workflow-editor:
    enabled: true
    port: 16200
    description: "Turing Workflow Editor"
    ui: "http://localhost:16200/"
    binary:
      repo: scivicslab/Turing-workflow-editor
      version: v1.0.0
      asset: turing-workflow-editor-v1.0.0-linux-x86_64
      path: ~/bin/turing-workflow-editor
