backend: jvm

jvm:
  tools:
    # Chat UI: launched on demand from the dashboard
    - name: quarkus-chat-ui
      jar: quarkus-chat-ui.jar
      github: scivicslab/quarkus-chat-ui
      port: 28100
      autoStart: false
      gatewayMcpProp: chat-ui.agent-loop.mcp-urls
      params:
        - key: workdir
          label: Working Directory
          type: dir
          default: ${HOME}/works
          workingDir: true
        - key: provider
          label: LLM Provider
          type: select
          default: ${DEFAULT_PROVIDER}
          jvmProp: chat-ui.provider
          options:
            - { value: claude,        label: Claude }
            - { value: codex,         label: Codex (OpenAI) }
            - { value: openai-compat, label: Local LLM (vLLM) }
        - key: servers
          label: vLLM Endpoint (Local LLM only)
          type: text
          default: ${VLLM_ENDPOINT}
          jvmProp: chat-ui.servers
        - key: allowed-dirs
          label: Allowed Directories (comma-separated)
          type: text
          default: ${HOME}/works
          jvmProp: chat-ui.filesystem.allowed-dirs

    # Document portal: single instance (only one can run at a time)
    - name: html-saurus
      jar: html-saurus.jar
      github: scivicslab/html-saurus
      port: 28110
      autoStart: false
      args:
        - ${HOME}/works
        - --portal-mode
        - --serve
        - --port
        - "${PORT}"
      params:
        - key: dir
          label: Document Root
          type: dir
          default: ${HOME}/works
          argPos: 0

    # Turing Workflow Editor: launched on demand
    - name: turing-workflow-editor
      jar: turing-workflow-editor.jar
      github: scivicslab/Turing-workflow-editor
      port: 28120
      autoStart: false
      jvmArgs:
        - "-Xmx2g"
      params:
        - key: workdir
          label: Working Directory
          type: dir
          default: ${HOME}/works
          workingDir: true

    # Code Raptor: code search and symbol index (GNU Global + Lucene)
    - name: code-raptor
      jar: code-raptor.jar
      port: 28130
      autoStart: false
      singleInstance: true

    # MCP Gateway: starts automatically, listed last as it is rarely launched manually
    - name: quarkus-mcp-gateway
      jar: quarkus-mcp-gateway.jar
      github: scivicslab/quarkus-mcp-gateway
      port: 28001
      fixedPort: true
      autoStart: true
