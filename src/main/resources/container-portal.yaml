portal:
  port: 16080
  mode: container
  title: "AI Worker"

management:
  mcp-gateway:
    enabled: true
    port: 16888
    description: "MCP Gateway"
    ui: "http://localhost:16888/"
    binary:
      repo: scivicslab/quarkus-mcp-gateway
      version: v1.0.0
      asset: quarkus-mcp-gateway-v1.0.0-linux-x86_64
      path: ~/bin/quarkus-mcp-gateway

tools:
  llm-console-local:
    description: "LLM Console (Local)"
    icon: "\uD83D\uDCAC"
    port-range: "16100-16119"
    binary:
      repo: scivicslab/quarkus-llm-console
      version: v1.1.0
      asset: quarkus-llm-console-v1.1.0-linux-x86_64
      path: ~/bin/quarkus-llm-console

  claude-code:
    description: "Claude Code"
    icon: "\uD83E\uDD16"
    port-range: "16120-16139"
    binary:
      repo: scivicslab/quarkus-llm-console-claude
      version: v1.1.0
      asset: quarkus-llm-console-claude-v1.1.0-linux-x86_64
      path: ~/bin/quarkus-llm-console-claude

  codex:
    description: "Codex"
    icon: "\uD83D\uDCBB"
    port-range: "16140-16159"
    binary:
      repo: scivicslab/quarkus-llm-console-codex
      version: v1.1.0
      asset: quarkus-llm-console-codex-v1.1.0-linux-x86_64
      path: ~/bin/quarkus-llm-console-codex

  workflow-editor:
    description: "Workflow Editor"
    icon: "\uD83D\uDD00"
    port-range: "16200-16219"
    binary:
      repo: scivicslab/Turing-workflow-editor
      version: v1.0.0
      asset: turing-workflow-editor-v1.0.0-linux-x86_64
      path: ~/bin/turing-workflow-editor

  docusaurus:
    description: "Docusaurus"
    icon: "\uD83D\uDCDD"
    port-range: "16300-16319"
    binary:
      repo: ""
      version: ""
      asset: ""
      path: ""
      runtime: "npx"
      args: "docusaurus start --port {port} --host 0.0.0.0"
