name: Build and upload native image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v2.2.0)'
        required: true
        default: 'v2.2.0'

permissions:
  contents: write

jobs:
  build-native:
    name: Native image — ${{ matrix.suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            suffix: linux-aarch64
          - os: macos-latest
            suffix: macos-aarch64
          - os: windows-latest
            suffix: windows-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Build native image (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mvn package -Dnative -DskipTests
          VERSION="${{ github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          cp "target/quarkus-AI-workspace-${VERSION}" \
             "quarkus-AI-workspace-${VERSION}-${{ matrix.suffix }}"

      - name: Build native image (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mvn package -Dnative -DskipTests
          $VERSION = "${{ github.event.inputs.tag }}" -replace '^v', ''
          Copy-Item "target\quarkus-AI-workspace-${VERSION}.exe" `
                    "quarkus-AI-workspace-${VERSION}-${{ matrix.suffix }}.exe"

      - name: Upload to release (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          VERSION="${VERSION#v}"
          gh release upload "${{ github.event.inputs.tag }}" \
            "quarkus-AI-workspace-${VERSION}-${{ matrix.suffix }}" \
            --clobber

      - name: Upload to release (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.inputs.tag }}" -replace '^v', ''
          gh release upload "${{ github.event.inputs.tag }}" `
            "quarkus-AI-workspace-${VERSION}-${{ matrix.suffix }}.exe" `
            --clobber
